<!DOCTYPE html>
<html><head><style>
@font-face{font-family:'WorkSans';src:url('C:/Users/rajkh/.claude/skills/canvas-design/canvas-fonts/WorkSans-Regular.ttf')format('truetype')}
@font-face{font-family:'WorkSans';src:url('C:/Users/rajkh/.claude/skills/canvas-design/canvas-fonts/WorkSans-Bold.ttf')format('truetype');font-weight:700}
@font-face{font-family:'YoungSerif';src:url('C:/Users/rajkh/.claude/skills/canvas-design/canvas-fonts/YoungSerif-Regular.ttf')format('truetype')}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:1200px;height:630px;background:linear-gradient(135deg,#08080c,#111122,#0a0a0f);position:relative;overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025)1px,transparent 1px);background-size:40px 40px}
.glow{position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,0.06),transparent 70%)}
.glow2{position:absolute;bottom:-150px;left:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.04),transparent 70%)}
.content{position:absolute;inset:50px;display:flex;flex-direction:column;justify-content:center}
.badge{font-family:'WorkSans',sans-serif;font-size:11px;letter-spacing:0.3em;color:rgba(0,212,255,0.5);text-transform:uppercase;margin-bottom:16px}
.title{font-family:'YoungSerif',serif;font-size:56px;color:rgba(255,255,255,0.92);line-height:1.15;margin-bottom:12px}
.accent{color:#00d4ff}
.sub{font-family:'WorkSans',sans-serif;font-size:18px;color:rgba(255,255,255,0.4);line-height:1.5;max-width:75%}
.tag{position:absolute;bottom:50px;right:50px;font-family:'WorkSans',sans-serif;font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:0.15em}
.line{width:60px;height:2px;background:rgba(0,212,255,0.3);margin:16px 0}
</style></head><body>
<div class="card"><div class="grid"></div><div class="glow"></div><div class="glow2"></div>
<div class="content">
<div class="badge">Multi-Agent Orchestration Platform</div>
<div class="title">Deploy an <span class="accent">AI Team</span><br>Not Just an Agent</div>
<div class="line"></div>
<div class="sub">Specialized agents in a multi-tier hierarchy — working together, communicating, delegating, and executing complex workflows autonomously.</div>
</div>
<div class="tag">LUXOR9 · luxor9.app</div>
</div></body></html>
