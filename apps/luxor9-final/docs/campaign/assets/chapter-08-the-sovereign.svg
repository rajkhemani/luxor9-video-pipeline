<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-label="LUXOR9 campaign key visual — Chapter VIII: The Sovereign">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#C8A96A" stop-opacity="0.055"/>
      <stop offset="60%" stop-color="#C8A96A" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#C8A96A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1350" fill="#030303"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- frames -->
  <rect x="36" y="36" width="1008" height="1278" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.55"/>
  <rect x="50" y="50" width="980" height="1250" fill="none" stroke="#C8A96A" stroke-width="0.5" opacity="0.18"/>

  <!-- masthead -->
  <text x="540" y="128" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F0E8" text-anchor="middle" letter-spacing="14">LUXOR9</text>
  <path d="M 540 152 L 548 164 L 540 176 L 532 164 Z" fill="none" stroke="#C8A96A" stroke-width="1"/>

  <!-- act label, vertical -->
  <text x="988" y="675" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#C8A96A" opacity="0.6" letter-spacing="4" text-anchor="middle" transform="rotate(90 988 675)">ACT III · THE CONTINUUM</text>

  <!-- ghost numeral -->
  <text x="540" y="720" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="340" fill="#C8A96A" opacity="0.07" text-anchor="middle">VIII</text>
  <text x="540" y="720" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="340" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.12" text-anchor="middle">VIII</text>

  <!-- motif -->

    <!-- The Sovereign: the signet — a nine-pointed seal -->
    <circle cx="540" cy="520" r="130" fill="none" stroke="#C8A96A" stroke-width="1.5"/>
    <circle cx="540" cy="520" r="104" fill="none" stroke="#C8A96A" stroke-width="0.75" opacity="0.45"/>
    <g stroke="#C8A96A" stroke-width="1" opacity="0.85">
      <line x1="540" y1="416" x2="540" y2="390"/>
      <line x1="607" y1="440" x2="624" y2="420"/>
      <line x1="642" y1="502" x2="668" y2="497"/>
      <line x1="630" y1="573" x2="652" y2="588"/>
      <line x1="576" y1="618" x2="585" y2="643"/>
      <line x1="504" y1="618" x2="495" y2="643"/>
      <line x1="450" y1="573" x2="428" y2="588"/>
      <line x1="438" y1="502" x2="412" y2="497"/>
      <line x1="473" y1="440" x2="456" y2="420"/>
    </g>
    <text x="540" y="545" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="72" fill="#C8A96A" text-anchor="middle">9</text>


  <!-- chapter title -->
  <text x="540" y="898" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="68" fill="#F5F0E8" text-anchor="middle" letter-spacing="9">THE SOVEREIGN</text>
  <line x1="505" y1="936" x2="575" y2="936" stroke="#C8A96A" stroke-width="1"/>

  <!-- epigraph -->
  <text x="540" y="1012" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#F5F0E8" opacity="0.62" text-anchor="middle" letter-spacing="0.5">Ownership is loud.</text><text x="540" y="1056" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#F5F0E8" opacity="0.62" text-anchor="middle" letter-spacing="0.5">Authorship is quiet.</text>

  <!-- colophon -->
  <line x1="120" y1="1218" x2="960" y2="1218" stroke="#C8A96A" stroke-width="0.5" opacity="0.3"/>
  <text x="540" y="1256" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#C8A96A" opacity="0.75" letter-spacing="3" text-anchor="middle">CHAPTER VIII OF IX · THE SOVEREIGN · MMXXVI</text>
  <text x="540" y="1284" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#F5F0E8" opacity="0.3" letter-spacing="2" text-anchor="middle">LUXOR9 ATELIER — SERIALIZED CAMPAIGN — BY INVITATION</text>
</svg>
