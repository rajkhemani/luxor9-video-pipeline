<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-label="LUXOR9 campaign key visual — Chapter VII: The Continuum">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#C8A96A" stop-opacity="0.055"/>
      <stop offset="60%" stop-color="#C8A96A" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#C8A96A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1350" fill="#030303"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>

  <!-- frames -->
  <rect x="36" y="36" width="1008" height="1278" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.55"/>
  <rect x="50" y="50" width="980" height="1250" fill="none" stroke="#C8A96A" stroke-width="0.5" opacity="0.18"/>

  <!-- masthead -->
  <text x="540" y="128" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F0E8" text-anchor="middle" letter-spacing="14">LUXOR9</text>
  <path d="M 540 152 L 548 164 L 540 176 L 532 164 Z" fill="none" stroke="#C8A96A" stroke-width="1"/>

  <!-- act label, vertical -->
  <text x="988" y="675" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#C8A96A" opacity="0.6" letter-spacing="4" text-anchor="middle" transform="rotate(90 988 675)">ACT III · THE CONTINUUM</text>

  <!-- ghost numeral -->
  <text x="540" y="720" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="430" fill="#C8A96A" opacity="0.07" text-anchor="middle">VII</text>
  <text x="540" y="720" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="430" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.12" text-anchor="middle">VII</text>

  <!-- motif -->

    <!-- The Continuum: orbits — the ellipse that never closes its ledger -->
    <ellipse cx="540" cy="520" rx="180" ry="66" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.55" transform="rotate(-18 540 520)"/>
    <ellipse cx="540" cy="520" rx="180" ry="66" fill="none" stroke="#C8A96A" stroke-width="1" opacity="0.8" transform="rotate(22 540 520)"/>
    <ellipse cx="540" cy="520" rx="118" ry="118" fill="none" stroke="#C8A96A" stroke-width="0.75" opacity="0.3"/>
    <circle cx="540" cy="520" r="5" fill="#C8A96A"/>
    <circle cx="688" cy="472" r="4" fill="none" stroke="#C8A96A" stroke-width="1.2"/>


  <!-- chapter title -->
  <text x="540" y="898" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="68" fill="#F5F0E8" text-anchor="middle" letter-spacing="9">THE CONTINUUM</text>
  <line x1="505" y1="936" x2="575" y2="936" stroke="#C8A96A" stroke-width="1"/>

  <!-- epigraph -->
  <text x="540" y="1012" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#F5F0E8" opacity="0.62" text-anchor="middle" letter-spacing="0.5">Not an ending.</text><text x="540" y="1056" font-family="Didot, 'Bodoni MT', 'Playfair Display', Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" fill="#F5F0E8" opacity="0.62" text-anchor="middle" letter-spacing="0.5">An orbit.</text>

  <!-- colophon -->
  <line x1="120" y1="1218" x2="960" y2="1218" stroke="#C8A96A" stroke-width="0.5" opacity="0.3"/>
  <text x="540" y="1256" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#C8A96A" opacity="0.75" letter-spacing="3" text-anchor="middle">CHAPTER VII OF IX · THE NAVIGATOR · MMXXVI</text>
  <text x="540" y="1284" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#F5F0E8" opacity="0.3" letter-spacing="2" text-anchor="middle">LUXOR9 ATELIER — SERIALIZED CAMPAIGN — BY INVITATION</text>
</svg>
