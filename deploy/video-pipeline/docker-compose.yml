version: "3.8"

services:
  video-pipeline:
    build:
      context: ../..
      dockerfile: deploy/video-pipeline/Dockerfile
    image: luxor9/video-pipeline:latest
    container_name: luxor9-video
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - video-output:/app/output/videos
      - ./config/heygen-templates.json:/app/config/heygen-templates.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
        reservations:
          memory: 2G

  # Optional: nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: luxor9-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - video-pipeline
    profiles:
      - production

  # Optional: Redis for job queue
  redis:
    image: redis:7-alpine
    container_name: luxor9-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    profiles:
      - production

volumes:
  video-output:
  redis-data:
