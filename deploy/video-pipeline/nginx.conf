server {
    listen 80;
    server_name video.luxor9.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name video.luxor9.ai;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://video-pipeline:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for video processing
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Serve rendered videos directly
    location /videos/ {
        alias /app/output/videos/;
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
    }

    access_log /var/log/nginx/luxor9-video-access.log;
    error_log /var/log/nginx/luxor9-video-error.log;
}
