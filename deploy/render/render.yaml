services:
  # ── API Server ──────────────────────────────────────
  - type: web
    name: luxor9-video-api
    runtime: node
    repo: https://github.com/rajkhemani/luxor9-video-pipeline
    branch: main
    buildCommand: cd packages/video-orchestrator && npm install && cd ../video-engine && npm install
    startCommand: cd packages/video-orchestrator && npx tsx src/server.ts
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_VERSION
        value: "22"
      - key: REMOTION_PROJECT_DIR
        value: /opt/render/project/src/packages/video-engine
      - key: REMOTION_OUTPUT_DIR
        value: /opt/render/project/src/output/videos
      - key: AUDIO_OUTPUT_DIR
        value: /opt/render/project/src/output/audio
      # Optional: set these if you have API keys
      - key: HEYGEN_API_KEY
        sync: false
      - key: MUAPI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
    disk:
      name: video-storage
      mountPath: /opt/render/project/src/output
      sizeGB: 1

  # ── Background Worker (for rendering) ───────────────
  - type: worker
    name: luxor9-video-renderer
    runtime: node
    repo: https://github.com/rajkhemani/luxor9-video-pipeline
    branch: main
    buildCommand: cd packages/video-orchestrator && npm install && cd ../video-engine && npm install
    startCommand: cd packages/video-orchestrator && npx tsx src/cli.ts render-worker
    envVars:
      - key: REMOTION_PROJECT_DIR
        value: /opt/render/project/src/packages/video-engine
      - key: REMOTION_OUTPUT_DIR
        value: /opt/render/project/src/output/videos
