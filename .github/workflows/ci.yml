name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: pytest (contracts, tools, pipelines, QA)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install ffmpeg (QA tests generate media fixtures)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q

  node-typecheck:
    name: typecheck packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        package: [video-orchestrator, video-engine]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
      - name: Install
        working-directory: packages/${{ matrix.package }}
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: packages/${{ matrix.package }}
        run: npx tsc --noEmit
